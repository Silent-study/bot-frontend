name: Frontend Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Frontend to VPS
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Step 1 - Checkout Latest Code"
        uses: actions/checkout@v3

      - name: "📦 Step 2 - Install Dependencies"
        run: |
          echo "Installing frontend dependencies..."
          npm install
          echo "✅ Dependencies installed successfully"

      - name: "🏗️ Step 3 - Build Frontend"
        run: |
          echo "Building the frontend app..."
          npm run build
          echo "✅ Build completed successfully"

      - name: "🔄 Step 4 - Deploy to VPS"
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/silentstudy/frontend
            git pull origin main
            npm install
            npm run build
            echo "✅ Frontend is live!"

      - name: "🎉 Step 5 - Deployment Complete"
        run: echo "🎉 Frontend successfully deployed to silentstudy.net"
